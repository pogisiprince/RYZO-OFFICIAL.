<!DOCTYPE html>
<html lang="en" oncontextmenu="return false;"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RYZO-OS | RYZO OFFICIAL</title>
    
    <script>
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && (e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.keyCode == 85))) {
                return false;
            }
        };
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #8e44ad; 
            --market-red: #ff3131; /* Specific Red for Market */
            --bg: url('https://i.ibb.co/vz6V0qP/admin.jpg'); 
            --bg-overlay: rgba(0, 0, 0, 0.92);
            --card: rgba(255, 255, 255, 0.05); 
            --gold: #ffcf40; 
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); background-size: cover; background-position: center; color: white; overflow: hidden; height: 100vh; }
        body::before { content: ""; position: fixed; inset: 0; background: var(--bg-overlay); z-index: -1; }

        .page { height: calc(100vh - 130px); overflow-y: auto; display: none; padding: 15px; padding-bottom: 140px; }
        .page.active { display: block; }

        header { padding: 15px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; color: white; text-shadow: 0 0 10px var(--accent); letter-spacing: 2px; }
        
        /* BOTTOM NAV STYLING BASED ON YOUR IMAGE */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: #0a0a0a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 2000; }
        .nav-item { text-align: center; color: #777; font-weight: bold; font-size: 11px; font-family: 'Orbitron'; cursor: pointer; }
        .nav-item img { width: 30px; margin-bottom: 5px; opacity: 0.6; }
        
        /* Active State Highlights */
        .nav-item.active#btn-market { color: var(--market-red); }
        .nav-item.active#btn-market img { opacity: 1; filter: drop-shadow(0 0 5px var(--market-red)); }
        
        .nav-item.active#btn-sell { color: #f39c12; }
        .nav-item.active#btn-sell img { opacity: 1; }
        
        .nav-item.active#btn-chat { color: white; }
        .nav-item.active#btn-chat img { opacity: 1; }

        /* MARKET UI */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .item-card { background: var(--card); border-radius: 15px; border: 1px solid #222; overflow: hidden; }
        .market-media { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        .kira-btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; }
        .kira-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>

    <header>
        <div onclick="logout()" style="cursor:pointer; font-size:1.2rem; color:var(--accent);">🚪</div>
        <div class="logo">RYZO<span>OFFICIAL</span></div>
        <div id="coinTag" style="color:var(--gold); font-weight:bold;">🪙 0</div>
    </header>

    <div id="homePage" class="page active">
        <input type="text" id="marketSearch" class="kira-input" placeholder="🔍 Search Ryzo Market...">
        <div class="market-grid" id="marketGrid"></div>
    </div>

    <div id="sellPage" class="page">
        <div style="background:var(--card); padding:20px; border-radius:20px;">
            <h3 style="color:var(--accent); margin-bottom:15px; text-align:center;">UPLOAD TO MARKET</h3>
            <input type="file" id="filePost" class="kira-input">
            <input type="text" id="namePost" class="kira-input" placeholder="Project Name">
            <input type="number" id="pricePost" class="kira-input" placeholder="Price (Coins)">
            <input type="text" id="linkPost" class="kira-input" placeholder="Download Link">
            <button class="kira-btn" onclick="upload()">POST NOW</button>
        </div>
    </div>

    <div id="chatPage" class="page">
        <div id="chatListContainer"></div>
    </div>

    <div id="loginModal" style="display:none; position:fixed; inset:0; background:#000; z-index:6000; align-items:center; justify-content:center; padding:20px;">
        <div style="text-align:center; width:100%;">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px;">RYZO SYSTEM LOGIN</h2>
            <input type="file" id="regPic" class="kira-input">
            <input type="text" id="regName" class="kira-input" placeholder="ENTER NICKNAME">
            <button class="kira-btn" onclick="register()">INITIALIZE</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="btn-market" onclick="nav('homePage')">
            <img src="https://img.icons8.com/neon/96/shopping-cart.png"><br>MARKET
        </div>
        <div class="nav-item" id="btn-sell" onclick="nav('sellPage')">
            <img src="https://img.icons8.com/neon/96/outbox.png"><br>SELL
        </div>
        <div class="nav-item" id="btn-chat" onclick="nav('chatPage')">
            <img src="https://img.icons8.com/neon/96/chat.png"><br>CHATS
        </div>
    </div>

    <script>
        // RYZO DATABASE CONFIGURATION (AUTO-ENCODED)
        const _0xdb = ["aHR0cHM6Ly9yeXpvLW9mZmljaWFsLWRiLWRlZmF1bHQtcnRkYi5hc2lhLXNvdXRoZWFzdDEuZmlyZWJhc2VkYXRhYmFzZS5hcHAv"];
        const config = { databaseURL: atob(_0xdb[0]) };
        firebase.initializeApp(config); const db = firebase.database();

        let me = localStorage.getItem('kUser'), myPic = localStorage.getItem('kPic');

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id==='homePage') document.getElementById('btn-market').classList.add('active');
            if(id==='sellPage') document.getElementById('btn-sell').classList.add('active');
            if(id==='chatPage') document.getElementById('btn-chat').classList.add('active');
        }

        function init() {
            if(!me) { document.getElementById('loginModal').style.display = 'flex'; return; }
            db.ref('users/'+me+'/coins').on('value', s => { document.getElementById('coinTag').innerText = "🪙 " + (s.val()||0); });
            db.ref('market').on('value', s => {
                const g = document.getElementById('marketGrid'); g.innerHTML = "";
                s.forEach(c => {
                    const i = c.val();
                    g.innerHTML += `
                    <div class="item-card">
                        <img src="${i.media}" class="market-media">
                        <div style="padding:10px;">
                            <b style="font-size:0.8rem; display:block; margin-bottom:5px;">${i.name}</b>
                            <span style="color:var(--gold); font-weight:bold; font-size:0.9rem;">🪙 ${i.price}</span>
                            <button class="kira-btn" style="margin-top:8px;" onclick="window.open('${i.link}')">GET ASSET</button>
                        </div>
                    </div>`;
                });
            });
        }

        function upload() {
            const f = document.getElementById('filePost').files[0], n = document.getElementById('namePost').value, p = document.getElementById('pricePost').value, l = document.getElementById('linkPost').value;
            if(!f || !n) return alert("Complete details!");
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = () => { db.ref('market').push({name:n, price:p, seller:me, link:l, media:r.result}).then(()=>nav('homePage')); };
        }

        function register() {
            const n = document.getElementById('regName').value.trim(), f = document.getElementById('regPic').files[0];
            if(!n || !f) return alert("Nickname and Pic required!");
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = () => { localStorage.setItem('kUser', n); localStorage.setItem('kPic', r.result); db.ref('users/'+n).update({pfp: r.result, coins: 0}); location.reload(); };
        }

        function logout() { localStorage.clear(); location.reload(); }
        init();
    </script>
</body>
</html>
